name: Validate and release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  schedule:
    # Run daily to catch HACS rule changes
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── HACS validation ──────────────────────────────────────────────────────────
  validate:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: plugin

  # ── Release: attach dist file to GitHub release on tag push ─────────────────
  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub release with dist file
        uses: softprops/action-gh-release@v2
        with:
          files: dist/network-flow-card.js
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
